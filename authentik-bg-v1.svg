<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice" role="img" aria-label="">
  <defs>
    <!-- Base dark gradient: near-black with a subtle violet/blue tilt -->
    <linearGradient id="bg-base" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0b14" />
      <stop offset="0.5" stop-color="#0c0d18" />
      <stop offset="1" stop-color="#070811" />
    </linearGradient>

    <!-- Violet glow (top-left) -->
    <radialGradient id="glow-violet" cx="0.18" cy="0.22" r="0.55">
      <stop offset="0" stop-color="#6d28d9" stop-opacity="0.35" />
      <stop offset="0.6" stop-color="#6d28d9" stop-opacity="0.05" />
      <stop offset="1" stop-color="#6d28d9" stop-opacity="0" />
    </radialGradient>

    <!-- Blue glow (bottom-right) -->
    <radialGradient id="glow-blue" cx="0.85" cy="0.85" r="0.55">
      <stop offset="0" stop-color="#2563eb" stop-opacity="0.3" />
      <stop offset="0.6" stop-color="#2563eb" stop-opacity="0.04" />
      <stop offset="1" stop-color="#2563eb" stop-opacity="0" />
    </radialGradient>

    <!-- Faint grid for depth -->
    <pattern id="grid" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M 80 0 L 0 0 0 80" fill="none" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1" />
    </pattern>

    <!-- Vignette mask so the grid fades toward the edges -->
    <radialGradient id="grid-mask" cx="0.5" cy="0.5" r="0.7">
      <stop offset="0" stop-color="#fff" stop-opacity="1" />
      <stop offset="1" stop-color="#fff" stop-opacity="0" />
    </radialGradient>
    <mask id="grid-fade">
      <rect width="1920" height="1080" fill="url(#grid-mask)" />
    </mask>

    <!-- Diagonal accent line gradient (transparent -> faint -> transparent) -->
    <linearGradient id="line-accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#a855f7" stop-opacity="0" />
      <stop offset="0.5" stop-color="#a855f7" stop-opacity="0.5" />
      <stop offset="1" stop-color="#3b82f6" stop-opacity="0" />
    </linearGradient>
    <linearGradient id="line-accent-2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3b82f6" stop-opacity="0" />
      <stop offset="0.5" stop-color="#3b82f6" stop-opacity="0.35" />
      <stop offset="1" stop-color="#a855f7" stop-opacity="0" />
    </linearGradient>
  </defs>

  <!-- Base -->
  <rect width="1920" height="1080" fill="url(#bg-base)" />

  <!-- Faded grid -->
  <rect width="1920" height="1080" fill="url(#grid)" mask="url(#grid-fade)" />

  <!-- Color glows -->
  <rect width="1920" height="1080" fill="url(#glow-violet)" />
  <rect width="1920" height="1080" fill="url(#glow-blue)" />

  <!-- Diagonal accent lines -->
  <g stroke-width="1.25" fill="none">
    <line x1="-200" y1="200" x2="2120" y2="700" stroke="url(#line-accent)" />
    <line x1="-200" y1="350" x2="2120" y2="850" stroke="url(#line-accent-2)" />
    <line x1="-200" y1="900" x2="2120" y2="400" stroke="url(#line-accent)" stroke-opacity="0.7" />
  </g>

  <!-- Soft floating orbs for a little extra depth -->
  <g>
    <circle cx="320" cy="820" r="180" fill="#6d28d9" fill-opacity="0.06" />
    <circle cx="1620" cy="240" r="220" fill="#2563eb" fill-opacity="0.05" />
  </g>
</svg>
