<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice" role="img" aria-label="">
  <defs>
    <!-- Base tuned to sit right next to the login card's surface (~#1c1d23) -->
    <linearGradient id="bg-base" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0"   stop-color="#1a1b21" />
      <stop offset="0.5" stop-color="#1d1e25" />
      <stop offset="1"   stop-color="#16171d" />
    </linearGradient>

    <!-- Edge vignette to keep focus centered without darkening behind the card -->
    <radialGradient id="vignette" cx="0.5" cy="0.5" r="0.9">
      <stop offset="0.6" stop-color="#000" stop-opacity="0" />
      <stop offset="1"   stop-color="#000" stop-opacity="0.45" />
    </radialGradient>

    <!-- Violet glow tucked into the far corner -->
    <radialGradient id="glow-violet" cx="0.08" cy="0.12" r="0.55">
      <stop offset="0"    stop-color="#6d28d9" stop-opacity="0.16" />
      <stop offset="0.55" stop-color="#6d28d9" stop-opacity="0.04" />
      <stop offset="1"    stop-color="#6d28d9" stop-opacity="0" />
    </radialGradient>

    <!-- Blue glow opposite corner -->
    <radialGradient id="glow-blue" cx="0.95" cy="0.92" r="0.55">
      <stop offset="0"    stop-color="#2563eb" stop-opacity="0.14" />
      <stop offset="0.55" stop-color="#2563eb" stop-opacity="0.03" />
      <stop offset="1"    stop-color="#2563eb" stop-opacity="0" />
    </radialGradient>

    <!-- Faint grid for depth -->
    <pattern id="grid" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M 80 0 L 0 0 0 80" fill="none" stroke="#ffffff" stroke-opacity="0.022" stroke-width="1" />
    </pattern>

    <!-- Mask so the grid only shows in the middle band, fading at edges -->
    <radialGradient id="grid-mask" cx="0.5" cy="0.5" r="0.7">
      <stop offset="0" stop-color="#fff" stop-opacity="1" />
      <stop offset="1" stop-color="#fff" stop-opacity="0" />
    </radialGradient>
    <mask id="grid-fade">
      <rect width="1920" height="1080" fill="url(#grid-mask)" />
    </mask>

    <!-- Diagonal accent line gradients -->
    <linearGradient id="line-violet" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0"   stop-color="#a855f7" stop-opacity="0" />
      <stop offset="0.5" stop-color="#a855f7" stop-opacity="0.22" />
      <stop offset="1"   stop-color="#3b82f6" stop-opacity="0" />
    </linearGradient>
    <linearGradient id="line-blue" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0"   stop-color="#3b82f6" stop-opacity="0" />
      <stop offset="0.5" stop-color="#3b82f6" stop-opacity="0.18" />
      <stop offset="1"   stop-color="#a855f7" stop-opacity="0" />
    </linearGradient>
  </defs>

  <!-- Base -->
  <rect width="1920" height="1080" fill="url(#bg-base)" />

  <!-- Faded grid -->
  <rect width="1920" height="1080" fill="url(#grid)" mask="url(#grid-fade)" />

  <!-- Color glows pushed to corners -->
  <rect width="1920" height="1080" fill="url(#glow-violet)" />
  <rect width="1920" height="1080" fill="url(#glow-blue)" />

  <!-- Diagonal accent lines, kept away from the card area -->
  <g stroke-width="1" fill="none">
    <line x1="-200" y1="180"  x2="2120" y2="640" stroke="url(#line-violet)" />
    <line x1="-200" y1="930"  x2="2120" y2="470" stroke="url(#line-blue)" />
    <line x1="-200" y1="1020" x2="2120" y2="780" stroke="url(#line-violet)" stroke-opacity="0.5" />
  </g>

  <!-- Edge vignette on top so corners settle -->
  <rect width="1920" height="1080" fill="url(#vignette)" />
</svg>
